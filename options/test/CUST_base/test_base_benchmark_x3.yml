# network structures
network_g:
  type: CUSTNet
  upscaling_factor: 3  # 네트워크 스케일 2 -> 4 변경
  dim : 40
  patch_size : [12,14,16,18,12,14,16,18,12,14,16,18]
  window_size : 8
  group_size : 10

# path
path:
  pretrain_network_g: /workspace/LMLT/experiments/cust_msv2_exp_g10_lr_ema_x3/models/net_g_492500.pth
  strict_load_g: true
  strict_load_g: true

# validation settings
val:
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 3
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 3
      test_y_channel: true
