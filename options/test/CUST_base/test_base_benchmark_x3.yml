name: CUST_Base_x3
model_type: SRModel
scale: 3
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:  # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/Set5/HR
    dataroot_lq: /data/SR/testset/Set5/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk
  
  test_4:  # the 2nd test dataset
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/urban100/HR
    dataroot_lq: /data/SR/testset/urban100/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  test_3:  # the 1st test dataset
    name: B100
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/B100/HR
    dataroot_lq: /data/SR/testset/B100/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk
  
  test_2:  # the 2nd test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/Set14/HR
    dataroot_lq: /data/SR/testset/Set14/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  
  test_5:  # the 1st test dataset
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/Manga109/HR
