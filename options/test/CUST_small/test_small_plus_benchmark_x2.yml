name: CUST_Small_plus_x2
model_type: SRModel
scale: 2
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:  # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/Set5/HR
    dataroot_lq: /data/SR/testset/Set5/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk
  
  test_4:  # the 2nd test dataset
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/urban100/HR
    dataroot_lq: /data/SR/testset/urban100/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

  test_3:  # the 1st test dataset
    name: B100
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/B100/HR
    dataroot_lq: /data/SR/testset/B100/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk
  
  test_2:  # the 2nd test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/Set14/HR
    dataroot_lq: /data/SR/testset/Set14/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

  
  test_5:  # the 1st test dataset
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /data/SR/testset/Manga109/HR
    dataroot_lq: /data/SR/testset/Manga109/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

# network structures
network_g:
  type: CUSTNet
  upscaling_factor: 2  # 네트워크 스케일 2 -> 4 변경
  dim : 30
  patch_size : [18,18,18,18,18,18,18,18]
  window_size : 8
  group_size : 10

# path
path:
  pretrain_network_g: /workspace/LMLT/experiments/cust_plus_light_x2/models/net_g_495000.pth
  strict_load_g: true

# validation settings
val:
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true
